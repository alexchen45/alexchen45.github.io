<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATYC</title>
  <meta name="description" content="Official website for ATYC." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --panel: #111114;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --line: rgba(255, 255, 255, 0.09);
      --yellow: #ffad1f;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 173, 31, 0.16), transparent 28rem),
        radial-gradient(circle at 86% 72%, rgba(255, 173, 31, 0.08), transparent 24rem),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(680px, 100%);
      padding: clamp(28px, 7vw, 52px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018)), var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 44px;
      height: 44px;
      margin-bottom: 28px;
      border-radius: 14px;
      background: var(--yellow);
      color: #211400;
      font-weight: 850;
      letter-spacing: -0.05em;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 12vw, 104px);
      line-height: 0.88;
      letter-spacing: -0.075em;
    }

    p {
      max-width: 560px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2.5vw, 24px);
      line-height: 1.35;
    }

    nav {
      margin-top: 34px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 173, 31, 0.28);
      background: rgba(255, 173, 31, 0.08);
      color: var(--yellow);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      background: rgba(255, 173, 31, 0.14);
      border-color: rgba(255, 173, 31, 0.44);
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">A</div>
    <h1>ATYC</h1>
    <p>This is the official website for ATYC.</p>
    <nav aria-label="Site links">
      <a href="/cheflessiq/privacy.html">Chefless IQ Privacy Notice</a>
    </nav>
  </main>
</body>
</html>
